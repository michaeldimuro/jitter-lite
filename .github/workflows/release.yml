name: build

# Builds distributable Jitter binaries for macOS, Windows, and Linux.
# Trigger manually (Actions tab -> Run workflow) or by pushing a v* tag.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-latest
            artifact: jitter
          - name: windows-x64
            os: windows-latest
            artifact: jitter.exe
          - name: linux-x64
            os: ubuntu-latest
            artifact: jitter
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Linux needs GTK + appindicator + xdo dev libs for tao/tray-icon/enigo.
      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev libayatana-appindicator3-dev libdbus-1-dev pkg-config

      - name: Build release
        run: cargo build --release

      - name: Package macOS .app
        if: matrix.os == 'macos-latest'
        run: |
          chmod +x packaging/macos/bundle.sh
          ./packaging/macos/bundle.sh

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: jitter-${{ matrix.name }}
          path: |
            target/release/${{ matrix.artifact }}
            dist/Jitter.app
          if-no-files-found: error
