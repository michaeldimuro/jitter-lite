name: build

# Builds distributable Jitter binaries for macOS, Windows, and Linux.
# On a v* tag push it also publishes them as GitHub Release assets.
# Trigger manually (Actions tab -> Run workflow) or by pushing a v* tag.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-latest
          - name: windows-x64
            os: windows-latest
          - name: linux-x64
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Linux needs GTK + appindicator + xdo dev libs for tao/tray-icon/enigo.
      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev libayatana-appindicator3-dev libdbus-1-dev pkg-config

      - name: Build release
        run: cargo build --release

      # Package each platform into a single archive under release/.
      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          chmod +x packaging/macos/bundle.sh
          ./packaging/macos/bundle.sh
          mkdir -p staging release
          cp -R dist/Jitter.app staging/
          cp target/release/jitter staging/jitter
          cp README.md staging/
          ditto -c -k --keepParent staging release/jitter-${{ matrix.name }}.zip

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p staging release
          cp target/release/jitter staging/jitter
          cp README.md staging/
          tar -C staging -czf release/jitter-${{ matrix.name }}.tar.gz .

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging, release | Out-Null
          Copy-Item target/release/jitter.exe staging/
          Copy-Item README.md staging/
          Compress-Archive -Path staging/* -DestinationPath release/jitter-${{ matrix.name }}.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: jitter-${{ matrix.name }}
          path: release/*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    # Only publish a Release for tag builds, not manual runs.
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
